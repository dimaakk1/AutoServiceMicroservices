option csharp_namespace = "CatalogService.Protos";

service ServiceProtoService {
  rpc GetServiceById (GetServiceRequest) returns (ServiceResponse);
  rpc CheckServiceExists (GetServiceRequest) returns (ServiceExistsResponse);
}

message GetServiceRequest {
  int32 id = 1;
}

message ServiceResponse {
  int32 id = 1;
  string name = 2;
  double price = 3;
}

message ServiceExistsResponse {
  bool exists = 1;
}